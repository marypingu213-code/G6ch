<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特教數學互動教室</title>
    <style>
        @import url('https://fastly.jsdelivr.net/gh/justfont/open-huninn-font@1.1/font/jf-open-huninn.css');

        :root {
            --primary-color: #4A90E2;
            --secondary-color: #95a5a6;
            --bg-color: #F0F4F8;
            --correct-color: #7ED321;
            --wrong-color: #D0021B;
            --puzzle-color: #F5A623;
        }

        /* 強制套用粉圓體 */
        * {
            font-family: 'jf-open-huninn', "Microsoft JhengHei", sans-serif !important;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        #main-container {
            width: 95%;
            max-width: 1100px;
            background: white;
            padding: 2.5rem;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center;
        }

        .screen { display: none; }
        .active { display: block; }

        /* 大廳樣式 */
        h1 { font-size: 3.2rem; color: var(--primary-color); margin-bottom: 20px; }
        .lobby-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .unit-card {
            background: #fff;
            border: 5px solid #eee;
            border-radius: 25px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .unit-card.active-unit:hover {
            transform: translateY(-8px);
            border-color: var(--primary-color);
            background: #f0f7ff;
        }
        .unit-card.locked {
            background: #f9f9f9;
            color: #ccc;
            cursor: not-allowed;
            border: 5px dashed #ddd;
        }

        /* 通用按鈕樣式 */
        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.8rem;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
        }
        .btn-secondary { background: var(--secondary-color); font-size: 1.4rem; }

        /* 遊戲共同組件 */
        .question-img {
            max-width: 100%;
            height: 300px;
            object-fit: contain;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 3px solid #eee;
        }

        /* 單元二：拼圖專用樣式 */
        .puzzle-display {
            background: #eee;
            min-height: 80px;
            border-radius: 15px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 15px;
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary-color);
            border: 4px dashed #ccc;
        }
        .puzzle-piece {
            background: white;
            padding: 15px 25px;
            border: 3px solid var(--puzzle-color);
            border-radius: 12px;
            font-size: 2.2rem;
            cursor: pointer;
            user-select: none;
        }
        .piece-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        /* 靜安提示與結算印章 */
        #stamp-area {
            font-size: 3.5rem;
            color: var(--correct-color);
            font-weight: bold;
            margin: 30px;
            padding: 25px;
            border: 8px dashed var(--correct-color);
            display: inline-block;
            display: none;
            background: #f9fff9;
        }
        .quiet-remind { font-size: 1.5rem; color: #888; margin-top: 40px; font-style: italic; }
    </style>
</head>
<body>

<div id="main-container">
    
    <div id="screen-lobby" class="screen active">
        <h1>🏫 數學冒險大廳</h1>
        <div class="lobby-grid">
            <div class="unit-card active-unit" onclick="goToUnit(1)">
                <h3 style="font-size: 2.2rem;">單元一</h3>
                <p>算式連連看</p>
            </div>
            <div class="unit-card active-unit" onclick="goToUnit(2)">
                <h3 style="font-size: 2.2rem;">單元二</h3>
                <p>算式大拼圖</p>
            </div>
            <div class="unit-card locked"><div class="unit-number">單元三</div><h3 style="font-size: 1.8rem;">敬請期待</h3></div>
            <div class="unit-card locked"><div class="unit-number">單元四</div><h3 style="font-size: 1.8rem;">敬請期待</h3></div>
        </div>
        <p class="quiet-remind">請安靜地思考，準備好了就開始！</p>
    </div>

    <div id="screen-unit1-start" class="screen">
        <h1>📘 單元一：算式連連看</h1>
        <button class="btn" onclick="startUnit1()">進入遊戲</button>
        <button class="btn btn-secondary" onclick="showScreen('screen-lobby')">回大廳</button>
    </div>
    <div id="screen-unit1-game" class="screen">
        <div id="u1-progress" style="font-size: 1.5rem;"></div>
        <div id="u1-question" style="font-size: 2.5rem; background:#f0f7ff; padding:30px; margin:20px; border-radius:20px;"></div>
        <div id="u1-options" style="display:grid; grid-template-columns:1fr 1fr; gap:20px;"></div>
        <div id="u1-feedback" style="font-size: 2rem; margin-top:20px; height:40px;"></div>
    </div>

    <div id="screen-unit2-start" class="screen">
        <h1 style="color:var(--puzzle-color)">🧩 單元二：算式大拼圖</h1>
        <p style="font-size: 1.8rem;">請觀察圖片，點擊下方按鈕排出正確算式！</p>
        <br>
        <button class="btn" style="background:var(--puzzle-color)" onclick="startUnit2()">開始拼圖</button>
        <button class="btn btn-secondary" onclick="showScreen('screen-lobby')">回大廳</button>
    </div>

    <div id="screen-unit2-game" class="screen">
        <div id="u2-progress" style="font-size: 1.5rem;">進度：1 / 5</div>
        <img id="u2-img" class="question-img" src="" alt="題目圖片">
        
        <div class="puzzle-display" id="u2-display">
            </div>

        <div class="piece-container" id="u2-pieces">
            </div>

        <div style="margin-top: 30px;">
            <button class="btn btn-secondary" onclick="undoU2()">🔙 退回一步</button>
            <button class="btn" style="background:var(--correct-color)" onclick="checkU2Answer()">✅ 檢查算式</button>
        </div>
        <div id="u2-feedback" style="font-size: 2.2rem; margin-top:20px; height:50px; font-weight:bold;"></div>
    </div>

    <div id="screen-result" class="screen">
        <h1 id="result-title" style="font-size: 4rem;">🎉 挑戰完成！</h1>
        <p id="result-text" style="font-size: 2.5rem;"></p>
        <div id="stamp-area">✨ 你可以去蓋印章了 ✨</div>
        <br>
        <button class="btn" onclick="showScreen('screen-lobby')">回大廳</button>
    </div>

</div>

<script>
    // --- 資料設定 ---
    const u1Data = [
        { q: "爸爸有100元，買了15元的飲料3瓶，請問找回多少元？", options: ["100 - 15 × 3", "(100 - 15) × 3", "100 - (15 + 3)", "100 + 15 × 3"], correct: 0 },
        { q: "若涵買了4個30元的橡皮擦跟2個60元的自動鉛筆，請問需要付多少元？", options: ["30 × 4 + 60 × 2", "(30 + 60) × (4 + 2)", "30 + 4 + 60 + 2", "30 × 60 + 4 × 2"], correct: 0 }
    ];

    const u2Data = [
        { 
            img: "image/1-1.jpg", 
            pieces: ["100", "15", "3", "-", "×"], 
            correct: ["100", "-", "15", "×", "3"] 
        },
        { 
            img: "image/1-2.jpg", 
            pieces: ["30", "4", "60", "2", "+", "×", "×"], 
            correct: ["30", "×", "4", "+", "60", "×", "2"] 
        },
        { 
            img: "image/1-3.jpg", 
            pieces: ["2.5", "3.8", "4", "(", ")", "+", "×"], 
            correct: ["(", "2.5", "+", "3.8", ")", "×", "4"] 
        }
    ];

    let currentUnit = 1;
    let currentIndex = 0;
    let currentScore = 0;
    let u2UserAns = [];

    // --- 通用邏輯 ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function goToUnit(num) {
        if(num === 1) showScreen('screen-unit1-start');
        if(num === 2) showScreen('screen-unit2-start');
    }

    // --- 單元一邏輯 (略，與之前相同) ---
    function startUnit1() {
        currentIndex = 0; currentScore = 0;
        showScreen('screen-unit1-game');
        loadU1();
    }
    function loadU1() {
        const data = u1Data[currentIndex];
        document.getElementById('u1-progress').innerText = `進度：${currentIndex + 1} / ${u1Data.length}`;
        document.getElementById('u1-question').innerText = data.q;
        const optDiv = document.getElementById('u1-options');
        optDiv.innerHTML = '';
        data.options.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = 'btn'; b.style.fontSize = '1.8rem';
            b.innerText = o; b.onclick = () => {
                if(i === data.correct) { currentScore++; document.getElementById('u1-feedback').innerText = "✅ 太棒了！"; }
                else { document.getElementById('u1-feedback').innerText = "❌ 再想想看！"; }
                setTimeout(() => { currentIndex++; if(currentIndex < u1Data.length) loadU1(); else finish(u1Data.length); }, 1200);
            };
            optDiv.appendChild(b);
        });
        document.getElementById('u1-feedback').innerText = "";
    }

    // --- 單元二：拼圖邏輯 ---
    function startUnit2() {
        currentIndex = 0; currentScore = 0;
        showScreen('screen-unit2-game');
        loadU2();
    }

    function loadU2() {
        u2UserAns = [];
        const data = u2Data[currentIndex];
        document.getElementById('u2-progress').innerText = `題目：${currentIndex + 1} / ${u2Data.length}`;
        document.getElementById('u2-img').src = data.img;
        document.getElementById('u2-feedback').innerText = "";
        updateU2Display();

        const pieceDiv = document.getElementById('u2-pieces');
        pieceDiv.innerHTML = '';
        // 隨機打亂碎片順序
        const shuffled = [...data.pieces].sort(() => Math.random() - 0.5);
        shuffled.forEach(p => {
            const b = document.createElement('div');
            b.className = 'puzzle-piece';
            b.innerText = p;
            b.onclick = () => { u2UserAns.push(p); updateU2Display(); };
            pieceDiv.appendChild(b);
        });
    }

    function updateU2Display() {
        const disp = document.getElementById('u2-display');
        disp.innerHTML = u2UserAns.length === 0 ? "（請點選下方碎片）" : u2UserAns.join(' ');
    }

    function undoU2() {
        u2UserAns.pop();
        updateU2Display();
    }

    function checkU2Answer() {
        const data = u2Data[currentIndex];
        const feedback = document.getElementById('u2-feedback');
        
        if (JSON.stringify(u2UserAns) === JSON.stringify(data.correct)) {
            currentScore++;
            feedback.style.color = 'var(--correct-color)';
            feedback.innerText = "⭐ 拼對了！好厲害！";
            setTimeout(() => {
                currentIndex++;
                if(currentIndex < u2Data.length) loadU2();
                else finish(u2Data.length);
            }, 1500);
        } else {
            feedback.style.color = 'var(--wrong-color)';
            feedback.innerText = "算式順序好像不對喔，再試一次！";
        }
    }

    function finish(total) {
        showScreen('screen-result');
        document.getElementById('result-text').innerText = `你答對了 ${currentScore} 題！`;
        document.getElementById('stamp-area').style.display = (currentScore === total) ? 'inline-block' : 'none';
    }
</script>

</body>
</html>
